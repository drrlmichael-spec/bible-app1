<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bible Companion</title>
<link href="https://googleapis.com" rel="stylesheet">
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  padding: 0;
  font-family: 'DM Sans', sans-serif;
  background: transparent;
  color: #ffffff;
}
.container {
  width: 100%;
  max-width: 600px;
  margin: 0 auto;
  padding: 10px;
}
.canva-card-wrapper {
  background: linear-gradient(135deg, #00ced1 0%, #008b8b 100%);
  border: 1px solid rgba(0, 255, 255, 0.4);
  border-radius: 1.25rem;
  padding: 1.5rem;
  box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.3);
  backdrop-filter: blur(8px);
}
.form-section {
  background: rgba(0, 0, 0, 0.2);
  border: 1px solid rgba(0, 255, 255, 0.25);
  border-radius: 0.75rem;
  padding: 1.25rem;
  margin-bottom: 1.5rem;
}
.section-label {
  color: #ffffff;
  font-weight: 700;
  font-size: 0.75rem;
  text-transform: uppercase;
  display: block;
  margin-bottom: 1rem;
  letter-spacing: 0.1em;
  text-shadow: 0 1px 2px rgba(0,0,0,0.2);
}
/* NEAT GRID FOR BUTTONS */
.feeling-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr); /* Forces exactly 2 columns */
  gap: 10px;
  margin-bottom: 1rem;
}
.feeling-btn {
  padding: 12px;
  border: 2px solid #00ffff;
  background: rgba(255, 255, 255, 0.9);
  color: #008b8b;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
  font-size: 0.85rem;
  text-align: center;
  transition: 0.2s;
}
.feeling-btn.active {
  background: #00ffff;
  color: #008b8b;
  border-color: #00ffff;
}
.verse-chip-container {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 10px;
}
.verse-chip {
  background: #00ffff;
  color: #000000; /* Changed font color to black */
  border: none;
  padding: 6px 12px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 0.75rem;
  font-weight: 600;
}
/* SEARCH INTERFACE STYLING */
.search-group {
  display: flex;
  gap: 8px;
}
input[type="text"] {
  flex: 1;
  padding: 12px;
  border: 1px solid #00ffff;
  border-radius: 8px;
  background: rgba(0, 0, 0, 0.3);
  color: #ffffff;
  font-size: 0.95rem;
}
input[type="text"]::placeholder {
  color: rgba(255, 255, 255, 0.6);
}
.btn-primary {
  background: #00ffff;
  color: #008b8b;
  border: none;
  padding: 0 20px;
  border-radius: 8px;
  font-weight: 700;
  cursor: pointer;
}
.display-box {
  background: rgba(0,0,0,0.4);
  padding: 1.25rem;
  border-radius: 8px;
  margin-top: 1rem;
  line-height: 1.6;
  border-left: 4px solid #00ffff;
  display: none;
}

/* ========================================================
   NEW CSS PLACED HERE INSIDE THE MAIN STYLE TAG
   ======================================================== */
.btn-back-to-site {
  display: block;
  width: 100%;
  margin-top: 1.5rem;
  padding: 12px;
  background: transparent;
  color: #00ffff;
  border: 2px solid #00ffff;
  border-radius: 8px;
  font-weight: 700;
  font-size: 0.95rem;
  cursor: pointer;
  text-align: center;
  transition: 0.2s;
}
.btn-back-to-site:hover {
  background: rgba(0, 255, 255, 0.1);
}
</style>
</head>
<body>
<div class="container">
  <div class="canva-card-wrapper">
    <!-- CATEGORY SECTION -->
    <div class="form-section">
      <label class="section-label">😊 How do you feel?</label>
      <div class="feeling-grid">
        <button class="feeling-btn" onclick="handleFeeling('Anxious', this)">😰 Anxious</button>
        <button class="feeling-btn" onclick="handleFeeling('Depressed', this)">😔 Depressed</button>
        <button class="feeling-btn" onclick="handleFeeling('Lonely', this)">🥺 Lonely</button>
        <button class="feeling-btn" onclick="handleFeeling('Weak', this)">😞 Weak</button>
        <button class="feeling-btn" onclick="handleFeeling('Ashamed', this)">😳 Ashamed</button>
        <button class="feeling-btn" onclick="handleFeeling('Hopeful', this)">✨ Hopeful</button>
        <button class="feeling-btn" onclick="handleFeeling('Grateful', this)">🙏 Grateful</button>
        <button class="feeling-btn" onclick="handleFeeling('Struggling', this)">⚠️ Struggling</button>
      </div>
      <div id="suggested-display" class="display-box"></div>
    </div>

    <!-- BIBLE SEARCH SECTION -->
    <div class="form-section">
      <label class="section-label">📖 Bible Search</label>
      <div class="search-group">
        <input type="text" id="verse-ref" placeholder="e.g. John 3:16">
        <button class="btn-primary" onclick="searchVerse()">Search</button>
      </div>
      <div id="search-display" class="display-box"></div>
    </div>

    <!-- NEW NAVIGATION BUTTON ADDED AT THE BOTTOM OF THE CARD -->
    <button class="btn-back-to-site" onclick="sendBackToCanva()">
      ← Finish & Return
    </button>
  </div>
</div>

async function fetchVerse(ref) {

        // Fixed: Added the required /?url= prefix parameter to avoid routing errors
        const proxyUrl = 'https://corsproxy.io' + encodeURIComponent(targetUrl);

        // Fixed: Restored the missing fetch deployment runtime execution line
        const res = await fetch(proxyUrl, {
            headers: {
                'Authorization': `Token ${BIBLE_API_KEY}`
            }
        });
        
        const data = await res.json();
        
        if (data.passages && data.passages.length > 0) {
            return data.passages.join('');
        } else {
            return "Verse not found.";
        }
    } catch (error) {
        console.error("Fetch Error:", error);
        return "Error loading verse.";
    }
}

async function handleFeeling(feeling, btn) {
    document.querySelectorAll('.feeling-btn').forEach(b => b.classList.remove('active'));

    const display = document.getElementById('suggested-display');
    display.style.display = 'block';
    let html = `<p style="font-size:0.75rem; margin-bottom:10px; color:#ffffff; font-weight:bold;">CHOOSE A VERSE:</p><div class="verse-chip-container">`;
    feelingVerses[feeling].forEach(ref => {
        html += `<button class="verse-chip" onclick="loadChipVerse('${ref}')">${ref}</button>`;
    });
    html += `</div><div id="chip-content" style="margin-top:15px; border-top:1px solid rgba(255,255,255,0.2); padding-top:10px; display:none;"></div>`;
    display.innerHTML = html;
}

// ====== 5. CHIP SELECTION LOGIC ======
async function loadChipVerse(ref) {
    const area = document.getElementById('chip-content');
    area.style.display = 'block';
    area.innerHTML = '<i>Loading...</i>';
    const text = await fetchVerse(ref);
    area.innerHTML = `<strong>${ref}</strong><br><br>${text}`;
}

// ====== 6. SEARCH BAR LOGIC ======
async function searchVerse() {
    const ref = document.getElementById('verse-ref').value;
    const display = document.getElementById('search-display');
    if(!ref) return;
    display.style.display = 'block';
    display.innerHTML = '<i>Searching...</i>';
    const text = await fetchVerse(ref);
    display.innerHTML = text;
}

function sendBackToCanva() {
    window.top.location.href = "https://sobrietydaily.com";
}

// ====== 3. BIBLE FETCH LOGIC WITH CORS FIX ======
async function fetchVerse(ref) {
    try {
        const targetUrl = `${BIBLE_API_URL}?q=${encodeURIComponent(ref)}&include-passage-references=true&include-footnotes=false&include-headings=false`;
        
        // Fixed: Added the required /?url= prefix parameter to avoid routing errors
        const proxyUrl = 'https://corsproxy.io' + encodeURIComponent(targetUrl);

        // Fixed: Restored the missing fetch deployment runtime execution line
        const res = await fetch(proxyUrl, {
            headers: {
                'Authorization': `Token ${BIBLE_API_KEY}`
            }
        });
        
        const data = await res.json();
        
        if (data.passages && data.passages.length > 0) {
            return data.passages.join('');
        } else {
            return "Verse not found.";
        }
    } catch (error) {
        console.error("Fetch Error:", error);
        return "Error loading verse.";
    }
}

// ====== 4. EMOTION BUTTON TRIGGER LOGIC ======
async function handleFeeling(feeling, btn) {
    document.querySelectorAll('.feeling-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const display = document.getElementById('suggested-display');
    display.style.display = 'block';
    let html = `<p style="font-size:0.75rem; margin-bottom:10px; color:#ffffff; font-weight:bold;">CHOOSE A VERSE:</p><div class="verse-chip-container">`;
    feelingVerses[feeling].forEach(ref => {
        html += `<button class="verse-chip" onclick="loadChipVerse('${ref}')">${ref}</button>`;
    });
    html += `</div><div id="chip-content" style="margin-top:15px; border-top:1px solid rgba(255,255,255,0.2); padding-top:10px; display:none;"></div>`;
    display.innerHTML = html;
}

// ====== 5. CHIP SELECTION LOGIC ======
async function loadChipVerse(ref) {
    const area = document.getElementById('chip-content');
    area.style.display = 'block';
    area.innerHTML = '<i>Loading...</i>';
    const text = await fetchVerse(ref);
    area.innerHTML = `<strong>${ref}</strong><br><br>${text}`;
}

// ====== 6. SEARCH BAR LOGIC ======
async function searchVerse() {
    const ref = document.getElementById('verse-ref').value;
    const display = document.getElementById('search-display');
    if(!ref) return;
    display.style.display = 'block';
    display.innerHTML = '<i>Searching...</i>';
    const text = await fetchVerse(ref);
    display.innerHTML = text;
}
